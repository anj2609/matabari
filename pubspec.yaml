name: matabari
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.9.0


dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.8
  smooth_page_indicator: ^2.0.1
  image_picker: ^1.2.2
  file_picker: ^11.0.2
  carousel_slider: ^5.1.2
  get: ^4.7.3
  audioplayers: ^6.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter

 
  flutter_lints: ^5.0.0


flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/
 
  fonts:
    - family: CormorantInfant
      fonts:
        - asset: assets/fonts/CormorantInfant-Regular.ttf
          weight: 600
        - asset: assets/fonts/CormorantInfant-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/CormorantInfant-Bold.ttf
          weight: 700
       
  
